name: Build & Deploy to IIS

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore test_restapi/test_restapi.sln

      - name: Build
        run: dotnet build test_restapi/test_restapi.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test test_restapi/test_restapi.sln --no-build --verbosity normal

      - name: Publish
        run: |
          dotnet publish test_restapi/test_restapi.csproj \
            -c Release \
            -o publish

      - name: Install SSH Client
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      ####################################################
      # Stop IIS App Pool
      ####################################################

      - name: Stop IIS AppPool
        run: |
          ssh -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "powershell -Command \"Import-Module WebAdministration; Stop-WebAppPool -Name 'testapi'\""

      ####################################################
      # Backup Existing Website
      ####################################################

      - name: Backup Existing Deployment
        run: |
          ssh -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "powershell -Command \"
            \$date=Get-Date -Format yyyyMMddHHmmss;
            if(Test-Path 'C:\inetpub\testapi'){
              Copy-Item 'C:\inetpub\testapi' 'C:\inetpub\backup_testapi_\$date' -Recurse
            }\""

      ####################################################
      # Clean IIS Folder
      ####################################################

      - name: Clean IIS Folder
        run: |
          ssh -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "powershell -Command \"
            Get-ChildItem 'C:\inetpub\testapi' -Force |
            Remove-Item -Force -Recurse
            \""

      ####################################################
      # Copy Files
      ####################################################

      - name: Upload Publish Files
        run: |
          scp -P ${{ secrets.SSH_PORT }} \
            -r publish/* \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/c:/inetpub/testapi/

      ####################################################
      # Start IIS
      ####################################################

      - name: Start IIS AppPool
        run: |
          ssh -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "powershell -Command \"Import-Module WebAdministration; Start-WebAppPool -Name 'testapi'\""

      ####################################################
      # Verify IIS
      ####################################################

      - name: Verify AppPool
        run: |
          ssh -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "powershell -Command \"Get-WebAppPoolState testapi\""